<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="snaplot-demo" content="1" />
  <meta name="snaplot-local-auth" content="1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="Регистрация — Снэплот" />
  <meta property="og:description" content="Снэплот — официальный магазин цифровых товаров с эскроу. Подписки, аккаунты и ключи с гарантией магазина." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="../favicon.svg" />
  <meta name="twitter:card" content="summary" />
  <meta name="theme-color" content="#0a0c13" />
  <meta name="description" content="Снэплот — официальный магазин цифровых товаров с эскроу. Подписки, аккаунты и ключи с гарантией магазина." />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <title>Регистрация — Снэплот</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Onest:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/vars.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/new-pages.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>
<body class="auth-body">
  <a class="skip-link" href="#main">К основному содержанию</a>
  <div class="auth-wrap">
    <a class="logo auth-logo" href="../index.html">
      <span class="logo__mark" aria-hidden="true"><span></span><span></span><span></span></span>
      <span class="logo__name">Снэплот</span>
    </a>
    <div class="auth-card">
      <div class="auth-card__head">
        <h1 class="auth-card__h">Создать аккаунт</h1>
        <p class="auth-card__sub">Покупай в официальном магазине с гарантией</p>
      </div>
      <form class="auth-form" id="registerForm" novalidate>
        <div class="auth-field">
          <label class="auth-field__label" for="regUsername">Имя пользователя</label>
          <input class="auth-field__input" id="regUsername" type="text" placeholder="cool_trader" autocomplete="username" required minlength="3" />
        </div>
        <div class="auth-field">
          <label class="auth-field__label" for="regEmail">Email</label>
          <input class="auth-field__input" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="auth-field">
          <label class="auth-field__label" for="regPassword">Пароль</label>
          <div class="auth-field__wrap">
            <input class="auth-field__input" id="regPassword" type="password" placeholder="Минимум 8 символов" autocomplete="new-password" required minlength="8" />
            <button class="auth-field__eye" type="button" tabindex="-1" aria-label="Показать пароль">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
            </button>
          </div>
          <div class="auth-field__strength" id="pwStrength"></div>
        </div>
        <div class="auth-field">
          <label class="auth-field__label" for="regPassword2">Повторите пароль</label>
          <input class="auth-field__input" id="regPassword2" type="password" placeholder="••••••••" autocomplete="new-password" required />
        </div>
        <div class="auth-form__check">
          <label class="auth-check"><input type="checkbox" required /> <span>Принимаю <a href="rules.html">Правила</a> и <a href="aml.html">политику AML</a></span></label>
        </div>
        <div class="auth-form__check">
          <label class="auth-check"><input type="checkbox" id="authLocalOnly" /> <span>Только в браузере (демо: без API, данные в localStorage)</span></label>
        </div>
        <button class="btn btn-primary btn-lg auth-form__submit" type="submit">Зарегистрироваться</button>
        <div class="auth-form__divider"><span>или</span></div>
        <button class="btn auth-social" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.054a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/></svg>
          Войти через Discord
        </button>
      </form>
      <p class="auth-card__alt">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </div>

  <script src="../assets/js/core/store.js"></script>
  <script src="../assets/js/core/cart.js"></script>
  <script src="../assets/js/core/nav-shell.js"></script>
  <script src="../assets/js/core/ui.js"></script>
  <script src="../assets/js/core/header.js"></script>
    <script src="../assets/js/core/cmdk.js"></script>
    <script src="../assets/js/core/quickview.js"></script>
    <script src="../assets/js/core/compare.js"></script>
    <script src="../assets/js/core/forms.js"></script>
    <script src="../assets/js/core/infinity.js"></script>
    <script src="../assets/js/core/mobnav.js"></script>
    <script src="../assets/js/core/lazy-img.js"></script>
    <script src="../assets/js/core/partials.js"></script>
    <script src="../assets/js/core/i18n.js"></script>
    <script src="../assets/js/core/demo-state.js"></script>
    <script src="../assets/js/core/api.js"></script>
    <script src="../assets/js/core/auth-session.js"></script>
    <script src="../assets/js/core/saved-recent.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var name = document.getElementById('regUsername').value.trim();
      var email = document.getElementById('regEmail').value.trim();
      var p1 = document.getElementById('regPassword').value;
      var p2 = document.getElementById('regPassword2').value;
      if (p1 !== p2) {
        if (window.UI) UI.toast('Пароли не совпадают', { kind: 'warn' });
        return;
      }
      if (window.UI && UI.loader) UI.loader(true);
      var localOnly = document.getElementById('authLocalOnly') && document.getElementById('authLocalOnly').checked;
      window.Auth.register(email, p1, name, { localOnly: localOnly })
        .then(function (reg) {
          if (window.UI && UI.loader) UI.loader(false);
          if (window.UI) UI.toast('Аккаунт создан', { kind: 'success' });
          if (reg && reg.dev_email_verify_token) {
            window.location.href = 'confirm-email.html?token=' + encodeURIComponent(reg.dev_email_verify_token);
          } else if (reg && reg.email_verification_pending) {
            window.location.href = 'confirm-email.html';
          } else {
            window.location.href = 'cabinet.html';
          }
        })
        .catch(function (err) {
          if (window.UI && UI.loader) UI.loader(false);
          if (window.UI) UI.toast(err.message || 'Ошибка регистрации', { kind: 'error' });
        });
    });
    document.querySelector('.auth-field__eye').addEventListener('click', () => {
      const inp = document.getElementById('regPassword');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });
    (function () {
      var cb = document.getElementById('authLocalOnly');
      if (!cb) return;
      try {
        if (localStorage.getItem('snaplot:local-auth') === '1') cb.checked = true;
      } catch (e) {}
      if (new URLSearchParams(location.search).get('local') === '1') cb.checked = true;
    })();
    document.getElementById('regPassword').addEventListener('input', function () {
      const bar = document.getElementById('pwStrength');
      const v = this.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const labels = ['', 'Слабый', 'Средний', 'Хороший', 'Надёжный'];
      const colors = ['', '#f87171', '#fbbf24', '#34d399', '#22c55e'];
      bar.innerHTML = v ? `<div class="pw-bar"><div class="pw-bar__fill" style="width:${score * 25}%;background:${colors[score]}"></div></div><span style="color:${colors[score]}">${labels[score]}</span>` : '';
    });
  </script>
    <script src="../assets/js/core/footer-plus.js"></script>
    <script src="../assets/js/core/sw-register.js"></script>
</body>
</html>
